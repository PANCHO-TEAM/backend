version: '3.8'
name: cats-on-cakes

services:
  postgres:
    image: postgres:16-alpine
    container_name: cats-on-cakes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cats_on_cakes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: .
    container_name: cats-on-cakes-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cats_on_cakes?schema=public
    depends_on:
      - postgres


volumes:
  postgres_data:
